name: My First Workflow

on:
  push:
    branches:
      - main

jobs:
  hello:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Files
        run: ls -la

      - name: Current Directory
        run: pwd

      - name: Git Version
        run: git --version
      - name: List Files
        run: ls
      - name: Show Hidden Files
        run: ls -la
      - name: Print Working Directory
        run: pwd